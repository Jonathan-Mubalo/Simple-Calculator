<!doctype html>
<html>
  <head>
    <title>Simple calculator</title>
    <meta charset="Utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <link rel="favicon" href=".      ." />
  </head>
  <body>
    <main class="calculator body">
      <section class="input-field">
        <input id="display" type="text" readonly />
      </section>
      <section class="numbers">
        <button onclick="calculatorOperator('9')">9</button>
        <button onclick="calculatorOperator('8')">8</button>
        <button onclick="calculatorOperator('7')">7</button>
        <button class="design1" onclick="calculatorOperator('+')">+</button>
      </section>
      <section class="numbers">
        <button onclick="calculatorOperator('6')">6</button>
        <button onclick="calculatorOperator('5')">5</button>
        <button onclick="calculatorOperator('4')">4</button>
        <button class="design1" onclick="calculatorOperator('-')">-</button>
      </section>
      <section class="numbers">
        <button onclick="calculatorOperator('3')">3</button>
        <button onclick="calculatorOperator('2')">2</button>
        <button onclick="calculatorOperator('1')">1</button>
        <button class="design1" onclick="calculatorOperator('/')">∕</button>
      </section>
      <section class="numbers">
        <button onclick="calculatorOperator('0')">0</button>
        <button onclick="calculatorOperator('.')">.</button>
        <button onclick="calculatorOperator('00')">00</button>
        <button class="design1" onclick="calculatorOperator('*')">∗</button>
      </section>
      <section class="numbers">
         <button class="design1" onclick="calculatorOperator('√')">√</button>
        <button class="design1" onclick="calculatorOperator('²')">ⅹ²</button>
        <button class="design1" onclick="calculatorOperator('^')">ⅹ^ⅹ</button>

      </section>
      <section class="numbers">
        <button class="equals design2" onclick="clearDisplay()">clr</button>
        <button class="equals design2" onclick="calculate()">=</button>
      </section>

      <script src="index.js"></script>
    </main>
  </body>
</html>
